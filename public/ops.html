<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>LP Ops</title>
<link rel="icon" href="/logo.png" />
<style>
  /* ── Notion-inspired light palette ──────────────────────────────────── */
  :root {
    --bg:           #ffffff;
    --bg-soft:      #f7f7f5;
    --bg-hover:     #f1f1ef;
    --text:         #37352f;       /* Notion's signature text color */
    --text-2:       #787774;
    --text-3:       #9b9a97;
    --border:       rgba(55, 53, 47, 0.09);
    --border-strong:rgba(55, 53, 47, 0.16);
    --accent:       #2383e2;       /* Notion blue */
    --accent-soft:  rgba(35, 131, 226, 0.10);
    --accent-text:  #1a64b8;
    --shadow-soft:  0 1px 2px rgba(15, 15, 15, 0.04);
    --shadow-modal: 0 -4px 24px rgba(15, 15, 15, 0.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }

  /* ── Header (top tabs + view picker) ────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .nav-tabs {
    display: flex; gap: 4px;
    padding: 12px 16px 8px;
    align-items: center; justify-content: space-between;
  }
  .nav-tabs .brand {
    font-size: 14px; font-weight: 600; color: var(--text);
    letter-spacing: -0.01em;
  }
  .nav-tabs .tabs {
    display: flex; gap: 2px;
    background: var(--bg-soft); padding: 3px; border-radius: 8px;
  }
  .nav-tabs .tabs a {
    color: var(--text-2); text-decoration: none;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    transition: background 120ms, color 120ms;
  }
  .nav-tabs .tabs a.active { background: #fff; color: var(--text); box-shadow: var(--shadow-soft); }
  .nav-tabs .tabs a.disabled { color: var(--text-3); cursor: not-allowed; }

  .view-picker {
    display: flex; overflow-x: auto;
    padding: 4px 16px 12px;
    gap: 6px;
    scrollbar-width: none;
  }
  .view-picker::-webkit-scrollbar { display: none; }
  .view-picker button {
    background: #fff; color: var(--text-2);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer;
    transition: background 120ms, border-color 120ms, color 120ms;
  }
  .view-picker button:hover { background: var(--bg-hover); }
  .view-picker button.active {
    background: var(--accent-soft); color: var(--accent-text); border-color: rgba(35,131,226,0.35);
  }

  .updated-strip {
    padding: 0 16px 8px; color: var(--text-3);
    font-size: 11px; display: flex; gap: 8px; align-items: center;
  }
  .updated-strip .refresh-btn {
    background: none; border: 0; color: var(--accent);
    font-size: 11px; cursor: pointer; padding: 2px 6px;
  }
  .updated-strip .refresh-btn:hover { text-decoration: underline; }

  /* ── Search bar (All Jobs + Job done views only) ────────────────────── */
  .search-bar {
    display: none; /* shown via JS only on All Jobs + Job done */
    position: relative;
    padding: 4px 16px 10px;
  }
  .search-bar.show { display: block; }
  .search-bar input[type="search"] {
    width: 100%;
    background: var(--bg-soft);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 32px 9px 12px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.3;
    -webkit-appearance: none;
    transition: background 120ms, border-color 120ms;
  }
  .search-bar input[type="search"]::-webkit-search-decoration,
  .search-bar input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }
  .search-bar input[type="search"]:focus {
    outline: 0;
    border-color: var(--accent);
    background: #fff;
  }
  .search-bar .clear-btn {
    display: none;
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg-hover);
    color: var(--text-2);
    border: 0;
    border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 11px; line-height: 1;
    cursor: pointer;
    padding: 0;
  }
  .search-bar.has-query .clear-btn { display: inline-flex; align-items: center; justify-content: center; }
  .search-empty {
    padding: 24px 16px; text-align: center;
    color: var(--text-3); font-size: 13px;
  }

  /* ── Stage tabs (kanban) ────────────────────────────────────────────── */
  .stage-tabs {
    display: flex; overflow-x: auto;
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    scrollbar-width: none;
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .stage-tabs::-webkit-scrollbar { display: none; }
  .stage-tabs button {
    background: transparent; color: var(--text-2);
    border: 0; padding: 12px 12px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-right: 2px;
  }
  .stage-tabs button.active {
    color: var(--text); border-bottom-color: var(--text);
  }
  .stage-tabs button .badge {
    display: inline-block; margin-left: 6px;
    background: var(--bg-soft); color: var(--text-2);
    border-radius: 10px; padding: 1px 7px;
    font-size: 11px; font-weight: 500;
  }

  /* ── Kanban swipe track ─────────────────────────────────────────────── */
  .kanban-track {
    display: flex; overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    background: var(--bg-soft);
  }
  .kanban-track::-webkit-scrollbar { display: none; }
  .kanban-column {
    flex: 0 0 100%;
    scroll-snap-align: start;
    padding: 16px 16px 80px;
    min-height: 70vh;
  }
  .kanban-column .empty {
    color: var(--text-3); font-size: 13px; padding: 32px 0; text-align: center;
  }

  /* ── Card (Notion-style: white, subtle border, no aggressive shadow) ─ */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 120ms, box-shadow 120ms, border-color 120ms;
  }
  .card:hover { background: var(--bg-soft); }
  .card:active { background: var(--bg-hover); }
  .card-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px;
  }
  .card-title {
    font-size: 14px; font-weight: 500; color: var(--text);
    margin: 0; line-height: 1.35;
    word-break: break-word;
    letter-spacing: -0.005em;
  }
  .card-amount {
    font-size: 13px; font-weight: 500; color: var(--text);
    flex-shrink: 0;
    background: var(--bg-soft);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .card-meta {
    font-size: 12px; color: var(--text-2); margin-top: 4px; line-height: 1.4;
    word-break: break-word;
  }
  .card-meta .sep { color: var(--text-3); margin: 0 5px; }
  .card-bottom {
    margin-top: 8px; display: flex; gap: 6px;
    flex-wrap: wrap; align-items: center;
  }

  /* ── Conversation transcript (chatbot log on edit modal) ─────────────── */
  .convo-toggle {
    background: var(--bg-soft); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; font-size: 13px; font-weight: 500;
    width: 100%; text-align: left; cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: space-between;
  }
  .convo-toggle:hover { background: var(--bg-hover); }
  .convo-toggle .count { color: var(--text-2); font-size: 12px; font-weight: 400; }
  .convo-body {
    margin-top: 8px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    max-height: 50vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
  }
  .convo-body.collapsed { display: none; }
  .convo-msg {
    padding: 8px 12px; border-radius: 10px;
    font-size: 13px; line-height: 1.45;
    word-wrap: break-word; white-space: pre-wrap;
    max-width: 92%;
  }
  .convo-msg.assistant {
    align-self: flex-start;
    background: #fff; border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .convo-msg.user {
    align-self: flex-end;
    background: var(--accent); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .convo-msg.system {
    align-self: center; max-width: 95%;
    background: rgba(217,153,12,0.10); color: #876012;
    border: 1px solid rgba(217,153,12,0.25);
    font-size: 11px;
  }
  .convo-empty {
    color: var(--text-3); font-size: 13px;
    text-align: center; padding: 18px;
  }

  /* ── Notes preview on Contacted / Lost cards ─────────────────────────── */
  .card-notes {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--border);
    font-size: 12px; color: var(--text-2);
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    /* Cap to ~3 lines so very long note histories don't blow up the card */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-notes em { font-style: italic; color: var(--text-3); }

  /* ── "Tried contacting them" inline card button ─────────────────────── */
  .tried-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--border);
    gap: 8px;
  }
  .tried-row .last-touch {
    font-size: 11px; color: var(--text-2);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tried-row .last-touch strong { color: var(--text); font-weight: 500; }
  .tried-row .tried-btn {
    background: var(--bg-soft); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; font-weight: 500;
    cursor: pointer; flex-shrink: 0;
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 4px;
    transition: background 100ms, border-color 100ms;
  }
  .tried-row .tried-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
  .tried-row .tried-btn:active { background: var(--accent-soft); color: var(--accent-text); }
  .tried-row .tried-btn.done {
    background: rgba(0,135,107,0.12);
    color: #0d6b53;
    border-color: rgba(0,135,107,0.30);
  }
  .tried-row .tried-btn:disabled { opacity: 0.5; cursor: progress; }

  /* ── Notion-style tag pills ─────────────────────────────────────────── */
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
    line-height: 1.4;
  }
  .pill.stage-new       { background: rgba(0,120,223,0.13);  color: #1a52a3; }
  .pill.stage-quoted    { background: rgba(217,153,12,0.18); color: #876012; }
  .pill.stage-contacted { background: rgba(217,109,6,0.18);  color: #a15009; }
  .pill.stage-booked    { background: rgba(0,135,107,0.16);  color: #0d6b53; }
  .pill.stage-done      { background: rgba(0,107,73,0.18);   color: #0a4f3a; }
  .pill.stage-lost      { background: rgba(212,76,71,0.16);  color: #a82a25; }
  .pill.stage-fake      { background: rgba(120,120,120,0.18); color: #555555; }
  .pill.stage-other     { background: var(--bg-soft);        color: var(--text-2); }
  .pill.outreach        { background: rgba(217,109,6,0.18);  color: #a15009; }
  .pill.responded       { background: rgba(0,135,107,0.16);  color: #0d6b53; }
  .pill.client          { background: var(--bg-soft); color: var(--text-2); max-width: 100%; overflow: hidden; text-overflow: ellipsis; }

  /* ── List layout (booked / contacted) ──────────────────────────────── */
  .list-wrap { padding: 16px 16px 80px; background: var(--bg-soft); min-height: 70vh; }
  .list-section-header {
    color: var(--text-2); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 18px 0 8px;
  }
  .list-section-header:first-child { margin-top: 0; }

  /* ── Edit modal (bottom sheet) ─────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 15, 15, 0.40);
    z-index: 100; display: none;
  }
  .modal-backdrop.open { display: block; }
  .modal-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 101;
    max-height: 92vh; overflow-y: auto;
    background: var(--bg);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    box-shadow: var(--shadow-modal);
    transform: translateY(100%);
    transition: transform 220ms cubic-bezier(.2,.8,.2,1);
  }
  .modal-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border-strong); border-radius: 2px;
    margin: 8px auto 12px;
  }
  .sheet-header {
    padding: 0 18px 14px; border-bottom: 1px solid var(--border);
  }
  .sheet-header .title { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .sheet-header .sub { font-size: 13px; color: var(--text-2); margin-top: 4px; }
  .sheet-body { padding: 14px 18px 16px; }
  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 11px; font-weight: 500; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    font-size: 14px;
    font-family: inherit;
    -webkit-appearance: none;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: 0; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field .ro { color: var(--text-2); font-size: 13px; padding: 9px 0; word-break: break-word; line-height: 1.5; }
  .field .ro div { padding: 3px 0; }
  .field .ro strong { color: var(--text); font-weight: 500; }
  .field-row { display: flex; gap: 8px; align-items: stretch; }
  .field-row .field { flex: 1; }
  .quick-btn {
    background: var(--bg-soft); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .quick-btn:hover { background: var(--bg-hover); }
  .quick-btn:active { background: var(--accent-soft); color: var(--accent-text); border-color: var(--accent); }
  .sheet-actions {
    display: flex; gap: 8px;
    padding: 10px 18px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    position: sticky; bottom: 0;
  }
  .sheet-actions .secondary {
    flex: 1;
    background: #fff; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .sheet-actions .secondary:hover { background: var(--bg-soft); }
  .sheet-actions .primary {
    flex: 2;
    background: var(--accent); color: #fff;
    border: 0; border-radius: 6px;
    padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .sheet-actions .primary:hover { background: #1a64b8; }
  .sheet-actions .primary:disabled { background: var(--text-3); cursor: not-allowed; }

  /* ── Delete zone (two-step) ─────────────────────────────────────────── */
  .delete-zone {
    margin-top: 18px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .delete-btn {
    width: 100%;
    background: transparent; color: #b54300;
    border: 1px solid rgba(245, 93, 0, 0.25);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: all 120ms;
  }
  .delete-btn:hover {
    background: rgba(245, 93, 0, 0.06);
    border-color: rgba(245, 93, 0, 0.4);
  }
  .delete-btn.armed {
    background: #d72d2d; color: #fff;
    border-color: #d72d2d;
    font-weight: 600;
  }
  .delete-btn.armed:hover { background: #b51f1f; border-color: #b51f1f; }

  /* ── Toast for save feedback ────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px; font-weight: 500;
    z-index: 200;
    opacity: 0; transition: opacity 200ms;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(15,15,15,0.20);
  }
  .toast.error { background: #b32200; }
  .toast.show { opacity: 1; }

  /* ── Loading / error states ─────────────────────────────────────────── */
  .loading-banner, .error-banner {
    margin: 16px; padding: 12px 14px;
    border-radius: 8px; font-size: 13px;
  }
  .loading-banner { background: var(--bg-soft); color: var(--text-2); border: 1px solid var(--border); }
  .error-banner { background: rgba(212,76,71,0.10); color: #a82a25; border: 1px solid rgba(212,76,71,0.30); }

  /* ── Pull-to-refresh hint ───────────────────────────────────────────── */
  .ptr {
    text-align: center; color: var(--text-3); font-size: 11px;
    padding: 6px 0; height: 0; overflow: hidden;
    transition: height 120ms;
    background: var(--bg);
  }
  .ptr.show { height: 28px; }

  /* ── Chat dock (collapsed) ──────────────────────────────────────────── */
  .chat-dock {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-top: 1px solid var(--border);
    box-shadow: 0 -1px 4px rgba(15, 15, 15, 0.04);
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    cursor: pointer;
  }
  .chat-dock .icon {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
    box-shadow: 0 0 0 1px var(--border);
  }
  .chat-dock .icon img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .lp-logo-inline {
    width: 22px; height: 22px;
    border-radius: 50%;
    object-fit: cover;
    vertical-align: middle;
    margin-right: 6px;
    box-shadow: 0 0 0 1px var(--border);
  }
  .lp-logo-tiny {
    width: 16px; height: 16px;
    border-radius: 50%;
    object-fit: cover;
    vertical-align: text-bottom;
    margin-right: 4px;
  }
  .chat-dock .placeholder {
    flex: 1;
    color: var(--text-3); font-size: 13px;
  }
  .chat-dock .ctx-pill {
    background: var(--bg-soft); color: var(--text-2);
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    flex-shrink: 0;
  }

  /* ── Chat sheet (expanded) ──────────────────────────────────────────── */
  .chat-sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 102;
    height: 80vh;
    background: var(--bg);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    box-shadow: var(--shadow-modal);
    transform: translateY(100%);
    transition: transform 220ms cubic-bezier(.2,.8,.2,1);
    display: flex; flex-direction: column;
  }
  .chat-sheet.open { transform: translateY(0); }
  .chat-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .chat-header .title {
    font-size: 15px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-header .actions { display: flex; gap: 4px; }
  .chat-header button {
    background: transparent; border: 0;
    color: var(--text-2); font-size: 12px;
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
  }
  .chat-header button:hover { background: var(--bg-soft); color: var(--text); }

  .chat-context-strip {
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-soft);
    font-size: 11px; color: var(--text-2);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .chat-context-strip .ctx-tag {
    background: #fff; border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 10px;
    font-weight: 500; color: var(--text);
    font-size: 11px;
  }
  .chat-context-strip .ctx-select {
    -webkit-appearance: none; appearance: none;
    cursor: pointer; font-family: inherit;
    padding-right: 22px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23787774'/></svg>");
    background-repeat: no-repeat;
    background-position: right 7px center;
  }
  .chat-context-strip .clearable {
    cursor: pointer;
    transition: background 100ms;
  }
  .chat-context-strip .clearable:hover {
    background: var(--bg-hover);
  }

  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-empty {
    text-align: center; color: var(--text-3);
    font-size: 13px; padding: 24px 12px;
    line-height: 1.6;
  }
  .chat-empty .workflow-buttons {
    margin-top: 18px;
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .chat-empty .workflow-buttons button {
    background: #fff; border: 1px solid var(--border);
    color: var(--text); font-size: 13px; font-weight: 500;
    padding: 8px 14px; border-radius: 18px; cursor: pointer;
    transition: all 100ms;
  }
  .chat-empty .workflow-buttons button:hover {
    background: rgba(35, 131, 226, 0.06);
    border-color: rgba(35, 131, 226, 0.4);
    color: #2383e2;
  }

  /* Persistent quick-action strip above the input */
  .chat-quick-actions {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 8px 12px 0;
    scrollbar-width: none;
  }
  .chat-quick-actions::-webkit-scrollbar { display: none; }
  .chat-quick-actions button {
    flex-shrink: 0;
    background: #fff; border: 1px solid var(--border);
    color: var(--text-2); font-size: 11px; font-weight: 500;
    padding: 5px 11px; border-radius: 14px; cursor: pointer;
    white-space: nowrap;
    transition: all 100ms;
  }
  .chat-quick-actions button:hover {
    background: rgba(35, 131, 226, 0.06);
    border-color: rgba(35, 131, 226, 0.4);
    color: #2383e2;
  }

  .msg {
    max-width: 88%; padding: 10px 13px;
    border-radius: 14px; font-size: 14px;
    line-height: 1.45; word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--accent); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--bg-soft); color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center; max-width: 95%;
    background: rgba(217,153,12,0.10); color: #876012;
    border: 1px solid rgba(217,153,12,0.25);
    font-size: 12px; padding: 8px 12px;
    border-radius: 8px;
  }
  .tool-trace {
    align-self: flex-start; max-width: 88%;
    font-size: 11px; color: var(--text-2);
    background: transparent;
    padding: 2px 4px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .tool-trace .tool-row {
    display: flex; align-items: center; gap: 6px;
  }
  .tool-trace .tool-name {
    font-weight: 500; color: var(--text);
    background: var(--bg-soft); padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px;
  }
  .tool-trace .tool-name.error { background: rgba(212,76,71,0.10); color: #a82a25; }

  .typing {
    align-self: flex-start;
    color: var(--text-3); font-size: 13px;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .typing .dot {
    width: 6px; height: 6px;
    background: var(--text-3); border-radius: 50%;
    animation: pulse 1.2s infinite ease-in-out;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.3; }
    30% { opacity: 1; }
  }

  .chat-input-row {
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex; gap: 8px;
    align-items: flex-end;
  }
  .chat-input-row textarea {
    flex: 1;
    background: var(--bg-soft);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.4;
    resize: none;
    min-height: 38px;
    max-height: 120px;
    -webkit-appearance: none;
  }
  .chat-input-row textarea:focus {
    outline: 0; border-color: var(--accent);
    background: #fff;
  }
  .chat-input-row .send {
    background: var(--accent); color: #fff;
    border: 0; border-radius: 50%;
    width: 38px; height: 38px;
    font-size: 16px; cursor: pointer;
    flex-shrink: 0;
  }
  .chat-input-row .send:hover { background: #1a64b8; }
  .chat-input-row .send:disabled { background: var(--text-3); cursor: not-allowed; }

  /* Account for the chat dock when it's collapsed — content needs bottom padding */
  body { padding-bottom: 56px; }

  /* ── Floating + button (new job for existing client) ───────────────── */
  .fab {
    position: fixed;
    right: 16px;
    bottom: 72px; /* sit above the chat dock */
    z-index: 70;
    display: flex; align-items: center; gap: 8px;
    background: var(--accent); color: #fff;
    border: 0; border-radius: 24px;
    padding: 10px 16px 10px 12px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 16px rgba(15,15,15,0.15);
    cursor: pointer; font-family: inherit;
    letter-spacing: -0.01em;
  }
  .fab:hover { background: #1a64b8; }
  .fab .plus {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    font-size: 14px; line-height: 1;
  }

  /* ── Section header inside the edit modal ──────────────────────────── */
  .section-header {
    margin: 18px 0 10px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-header:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
  .section-header .hint {
    font-size: 10px; font-weight: 500; color: var(--text-3);
    text-transform: none; letter-spacing: 0;
  }

  /* ── Auto-save status indicator (in sheet-actions) ─────────────────── */
  .save-status {
    flex-shrink: 0;
    font-size: 11px; color: var(--text-3);
    align-self: center;
    padding: 0 4px;
    min-width: 56px;
    text-align: center;
    transition: color 120ms;
  }
  .save-status.saving { color: var(--text-2); }
  .save-status.saved  { color: #0d6b53; }
  .save-status.error  { color: #a82a25; }
  .save-status.dirty  { color: #876012; }

  /* ── Client search results list (in new-job modal) ─────────────────── */
  .client-search-results {
    max-height: 240px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 8px;
    background: #fff;
    margin-top: 4px;
  }
  .client-result {
    padding: 10px 12px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 100ms;
  }
  .client-result:last-child { border-bottom: 0; }
  .client-result:hover { background: var(--bg-soft); }
  .client-result.selected { background: var(--accent-soft); }
  .client-result .name { font-size: 14px; font-weight: 500; color: var(--text); }
  .client-result .meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .client-search-empty {
    padding: 14px 12px; text-align: center;
    color: var(--text-3); font-size: 13px;
  }
  .selected-client-card {
    background: var(--accent-soft); border: 1px solid rgba(35,131,226,0.25);
    border-radius: 8px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .selected-client-card .info .name {
    font-size: 14px; font-weight: 600; color: var(--text);
  }
  .selected-client-card .info .meta {
    font-size: 12px; color: var(--text-2); margin-top: 2px;
  }
  .selected-client-card .change-btn {
    background: #fff; color: var(--accent-text);
    border: 1px solid rgba(35,131,226,0.4);
    border-radius: 6px; padding: 5px 10px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <div class="nav-tabs">
    <div class="brand">LP Ops</div>
    <div class="tabs" id="top-tabs">
      <a href="dashboard.html" id="tab-dashboard">Dashboard</a>
      <a href="ops.html" class="active">Kanban</a>
      <a href="#" id="open-chat-btn">Chat</a>
    </div>
  </div>
  <div class="view-picker" id="view-picker">
    <button data-view="2026">2026 Jobs</button>
    <button data-view="all">All Jobs</button>
    <button data-view="booked">Booked Calendar</button>
    <button data-view="contacted">Waiting for Client</button>
    <button data-view="done">Job done</button>
  </div>
  <div class="updated-strip">
    <span id="updated-text">—</span>
    <button class="refresh-btn" id="refresh-btn">↻ refresh</button>
  </div>
  <div class="search-bar" id="search-bar">
    <input type="search" id="search-input" placeholder="Search by name or phone…" autocomplete="off" />
    <button type="button" class="clear-btn" id="search-clear" aria-label="Clear search">✕</button>
  </div>
</header>

<div class="ptr" id="ptr" aria-hidden="true"></div>

<main id="main">
  <div class="loading-banner" id="loading">Loading…</div>
</main>

<!-- Edit modal -->
<div class="modal-backdrop" id="modal-backdrop"></div>
<div class="modal-sheet" id="modal-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="title" id="sheet-title">—</div>
    <div class="sub" id="sheet-sub">—</div>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-actions">
    <button class="secondary" id="sheet-discuss" title="Open chat with this job as context"><img src="/logo.png" alt="" class="lp-logo-tiny" />Discuss</button>
    <span class="save-status" id="save-status"></span>

<!-- New-job modal (for adding a job to an existing client) -->

  <div class="sheet-handle"></div>

    <div class="title">New job for existing client</div>
    <div class="sub" id="newjob-sub">Pick a client, then fill out the job details.</div>
  </div>
  <div class="sheet-body" id="newjob-body"></div>
  <div class="sheet-actions">
    <button class="secondary" id="newjob-cancel">Cancel</button>
    <button class="primary" id="newjob-save" disabled>Create job</button>

<!-- Floating "+ New job" button (existing client) -->
<button class="fab" id="newjob-fab" title="Add a job for an existing client">
  <span class="plus">+</span>
  <span>New job</span>
</button>

<div class="toast" id="toast"></div>

<!-- Chat dock (collapsed bar at bottom) -->

  <div class="icon"><img src="/logo.png" alt="LP" /></div>
  <div class="placeholder" id="chat-dock-placeholder">Ask anything…</div>
  <div class="ctx-pill" id="chat-ctx-pill" style="display:none"></div>
</div>

<!-- Chat sheet (expanded full-screen) -->
<div class="chat-sheet" id="chat-sheet">
  <div class="chat-header">
    <div class="title"><img src="/logo.png" alt="" class="lp-logo-inline" />LP Ops Chat</div>
    <div class="actions">
      <button id="chat-clear" title="Clear conversation">Clear</button>
      <button id="chat-close" title="Close">Close</button>
    </div>
  </div>
  <div class="chat-context-strip" id="chat-ctx-strip">
    <span>Context:</span>
    <select class="ctx-tag ctx-select" id="ctx-view-select" title="Tap to change view"></select>
    <span class="ctx-tag clearable" id="ctx-job" style="display:none" title="Tap to clear">job</span>
    <span class="ctx-tag clearable" id="ctx-client" style="display:none" title="Tap to clear">client</span>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-quick-actions" id="chat-quick-actions">
    <button data-workflow="NEW CLIENT">+ New client</button>
    <button data-workflow="NEW JOB">+ Job (existing)</button>
    <button data-workflow="OUTREACH">Outreach</button>
    <button data-workflow="QUOTED">Quoted</button>
    <button data-workflow="BOOKED">Booked</button>
    <button data-workflow="DRAFT MESSAGE">Draft message</button>
  </div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="Tap a workflow above, or type what happened…" rows="1"></textarea>
    <button class="send" id="chat-send">↑</button>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────
  const qs = new URLSearchParams(location.search);
  // Auth key: prefer URL → sessionStorage → prompt once per session.
  // Stored in session-only storage so closing the tab logs you out.
  let apiKey = qs.get("key") || sessionStorage.getItem("lp_ops_key") || "";
  if (!apiKey) {
    apiKey = prompt("Enter access key:") || "";
    if (!apiKey) {
      document.getElementById("main").innerHTML =
        `<div class="error-banner">No access key. Reload and try again.</div>`;
      throw new Error("No access key");
    }
  }
  sessionStorage.setItem("lp_ops_key", apiKey);
  const apiBase = (qs.get("api") || "").replace(/\/$/, "");
  let currentView = qs.get("view") || localStorage.getItem("lp_ops_view") || "2026";
  let currentData = null;
  let currentJob = null; // job being edited
  let refreshTimer = null;
  let currentColumnIdx = 0; // which kanban column the user is on (preserved across reloads)
  let searchQuery = ""; // typed search filter (only visible on All Jobs + Job done views)

  // Views where the search bar is allowed to appear
  const SEARCHABLE_VIEWS = new Set(["all", "done"]);

  function jobMatchesSearch(j, q) {
    if (!q) return true;
    const lc = q.toLowerCase().trim();
    const digits = q.replace(/\D/g, "");
    const haystack = [
      j.jobId, j.clientName, j.clientFullName, j.clientFirstName,
      j.clientAddress, j.serviceType,
    ].filter(Boolean).join(" ").toLowerCase();
    if (haystack.includes(lc)) return true;
    if (digits && (j.clientPhone || "").replace(/\D/g, "").includes(digits)) return true;
    return false;
  }

  // Carry the auth key onto the Dashboard tab link
  const dashTab = document.getElementById("tab-dashboard");
  if (apiKey) dashTab.href = `dashboard.html?key=${encodeURIComponent(apiKey)}`;

  const PIPELINE_STAGES = [
    "🆕 New lead",
    "💬 Quoted",
    "📞 Contacted",
    "📅 Booked",
    "✅ Job done",
    "❌ Lost",
    "🚫 Fake",
  ];
  const LEAD_STATUSES = ["", "Quoted", "Booked", "Completed", "Lost", "Follow up", "Cold"];

  function stageClass(stage) {
    return ({
      "🆕 New lead":  "stage-new",
      "💬 Quoted":    "stage-quoted",
      "📞 Contacted": "stage-contacted",
      "📅 Booked":    "stage-booked",
      "✅ Job done":  "stage-done",
      "❌ Lost":      "stage-lost",
      "🚫 Fake":      "stage-fake",
    })[stage] || "stage-other";
  }
  function fmtMoney(n) {
    if (n == null || n === "") return "";
    const num = Number(n);
    return Number.isFinite(num) ? `$${num.toLocaleString()}` : "";
  }
  function fmtDate(iso) {
    if (!iso) return "";
    const d = new Date(iso + (iso.length === 10 ? "T12:00:00" : ""));
    if (Number.isNaN(d.getTime())) return iso;
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "2-digit" });
  }
  function fmtDateLong(iso) {
    if (!iso) return "";
    const d = new Date(iso + (iso.length === 10 ? "T12:00:00" : ""));
    if (Number.isNaN(d.getTime())) return iso;
    return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  }
  function fmtDateRelative(iso) {
    if (!iso) return "";
    const d = new Date(iso + (iso.length === 10 ? "T12:00:00" : ""));
    if (Number.isNaN(d.getTime())) return "";
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (days === 0) return "today";
    if (days === 1) return "1d ago";
    if (days > 0)   return `${days}d ago`;
    if (days === -1) return "tomorrow";
    return `in ${-days}d`;
  }
  function todayISO() { return new Date().toISOString().split("T")[0]; }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // ── View-picker ──────────────────────────────────────────────────────
  function setActiveView(v) {
    document.querySelectorAll("#view-picker button").forEach(b => {
      b.classList.toggle("active", b.dataset.view === v);
    });
  }
  setActiveView(currentView);
  document.getElementById("view-picker").addEventListener("click", e => {
    const btn = e.target.closest("button[data-view]");
    if (!btn) return;
    currentView = btn.dataset.view;
    localStorage.setItem("lp_ops_view", currentView);
    setActiveView(currentView);
    currentColumnIdx = 0; // user picked a new view → reset to first column
    load({ preservePosition: false });
  });

  // ── Refresh ──────────────────────────────────────────────────────────
  document.getElementById("refresh-btn").addEventListener("click", load);

  function setupAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(load, 5 * 60 * 1000);
  }

  // ── Pull-to-refresh ──────────────────────────────────────────────────
  // We keep the gesture but drop the visible "pull to refresh" hint — Luke
  // didn't want the wording. The .ptr element is intentionally empty.
  let ptrStart = null, ptrPulling = false;
  document.addEventListener("touchstart", e => {
    if (window.scrollY > 0) { ptrStart = null; return; }
    ptrStart = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener("touchmove", e => {
    if (ptrStart == null) return;
    const dy = e.touches[0].clientY - ptrStart;
    if (dy > 60 && !ptrPulling) {
      ptrPulling = true;
    }
  }, { passive: true });
  document.addEventListener("touchend", () => {
    if (ptrPulling) {
      ptrPulling = false;
      load();
    }
    ptrStart = null;
  });

  // ── Data load ────────────────────────────────────────────────────────
  async function load(opts = {}) {
    const preservePosition = opts.preservePosition !== false; // default true
    const savedScrollY = preservePosition ? window.scrollY : 0;
    try {
      const params = new URLSearchParams({ action: "data", view: currentView });
      if (apiKey) params.set("key", apiKey);
      const url = `${apiBase}/api/ops?${params.toString()}`;
      const r = await fetch(url);
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${r.status}`);
      }
      currentData = await r.json();
      render({ restoreColumn: preservePosition });
      if (preservePosition) {
        // Restore vertical scroll after the new DOM lays out
        requestAnimationFrame(() => window.scrollTo({ top: savedScrollY, behavior: "auto" }));
      }
      const t = new Date(currentData.generatedAt);
      document.getElementById("updated-text").textContent =
        `Updated ${t.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" })}`;
    } catch (err) {
      document.getElementById("main").innerHTML =
        `<div class="error-banner">Failed to load: ${escapeHtml(err.message)}</div>`;
    }
  }

  // ── Render ───────────────────────────────────────────────────────────
  function render(opts = {}) {
    if (!currentData) return;
    updateSearchBarVisibility();
    const main = document.getElementById("main");
    const data = applySearchFilter(currentData);
    if (data.layout === "kanban") renderKanban(main, data, opts.restoreColumn !== false);
    else renderList(main, data);
  }

  function applySearchFilter(data) {
    const q = searchQuery.trim();
    if (!q || !SEARCHABLE_VIEWS.has(data.viewKey)) return data;
    if (data.layout === "kanban") {
      const columns = data.columns.map(col => {
        const filtered = col.jobs.filter(j => jobMatchesSearch(j, q));
        return { ...col, jobs: filtered, count: filtered.length };
      });
      return { ...data, columns };
    } else {
      return { ...data, jobs: data.jobs.filter(j => jobMatchesSearch(j, q)) };
    }
  }

  // Search bar — only visible on All Jobs + Job done
  const searchBarEl = document.getElementById("search-bar");
  const searchInputEl = document.getElementById("search-input");
  const searchClearEl = document.getElementById("search-clear");

  function updateSearchBarVisibility() {
    const visible = SEARCHABLE_VIEWS.has(currentView);
    searchBarEl.classList.toggle("show", visible);
    if (!visible && searchQuery) {
      // Switching away from a searchable view → drop the query so it doesn't
      // linger and surprise the user when they come back.
      searchQuery = "";
      searchInputEl.value = "";
      searchBarEl.classList.remove("has-query");
    }
  }

  searchInputEl.addEventListener("input", () => {
    searchQuery = searchInputEl.value;
    searchBarEl.classList.toggle("has-query", !!searchQuery.trim());
    // Don't preserve column on a search re-render — filtering can empty the
    // current column, and the user wants to see hits, not stay at column 3.
    render({ restoreColumn: false });
  });
  searchClearEl.addEventListener("click", () => {
    searchQuery = "";
    searchInputEl.value = "";
    searchBarEl.classList.remove("has-query");
    searchInputEl.focus();
    render({ restoreColumn: true });
  });

  function renderKanban(main, data, restoreColumn = true) {
    main.innerHTML = `
      <div class="stage-tabs" id="stage-tabs"></div>
      <div class="kanban-track" id="kanban-track"></div>
    `;
    const tabsEl = document.getElementById("stage-tabs");
    const trackEl = document.getElementById("kanban-track");

    const targetIdx = restoreColumn
      ? Math.min(Math.max(0, currentColumnIdx), Math.max(0, data.columns.length - 1))
      : 0;

    data.columns.forEach((col, i) => {
      const tabBtn = document.createElement("button");
      tabBtn.dataset.idx = i;
      tabBtn.innerHTML = `${escapeHtml(col.stage)} <span class="badge">${col.count}</span>`;
      if (i === targetIdx) tabBtn.classList.add("active");
      tabBtn.addEventListener("click", () => {
        trackEl.scrollTo({ left: i * trackEl.clientWidth, behavior: "smooth" });
      });
      tabsEl.appendChild(tabBtn);

      const colEl = document.createElement("div");
      colEl.className = "kanban-column";
      colEl.dataset.stage = col.stage;
      if (!col.jobs.length) {
        colEl.innerHTML = `<div class="empty">No jobs in ${escapeHtml(col.stage)}.</div>`;
      } else {
        colEl.innerHTML = col.jobs.map(j => cardHtml(j, "kanban")).join("");
      }
      trackEl.appendChild(colEl);
    });

    // attach click handlers
    trackEl.querySelectorAll(".card").forEach(el => {
      el.addEventListener("click", () => openEditModal(el.dataset.id));
    });
    // Inline "Tried" buttons — must stop propagation so the card-click
    // handler above doesn't also fire and open the edit modal.
    trackEl.querySelectorAll("[data-tried]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        handleTriedClick(btn);
      });
    });

    // Jump to the preserved column WITHOUT smooth-scroll (instant restoration)
    if (targetIdx > 0) {
      requestAnimationFrame(() => {
        trackEl.scrollLeft = targetIdx * trackEl.clientWidth;
        const activeTab = tabsEl.querySelector(`button[data-idx="${targetIdx}"]`);
        if (activeTab) activeTab.scrollIntoView({ behavior: "auto", block: "nearest", inline: "center" });
      });
    }
    currentColumnIdx = targetIdx;

    // sync stage tab on scroll AND remember which column we're on
    let scrollTimeout;
    trackEl.addEventListener("scroll", () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        const idx = Math.round(trackEl.scrollLeft / trackEl.clientWidth);
        currentColumnIdx = idx;
        tabsEl.querySelectorAll("button").forEach((b, i) => {
          b.classList.toggle("active", i === idx);
        });
        // scroll the tab into view
        const activeTab = tabsEl.querySelector(`button[data-idx="${idx}"]`);
        if (activeTab) activeTab.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
      }, 80);
    });
  }

  function renderList(main, data) {
    let html = `<div class="list-wrap">`;
    if (!data.jobs.length) {
      html += `<div class="loading-banner">No jobs in ${escapeHtml(data.viewLabel)}.</div></div>`;
      main.innerHTML = html;
      return;
    }
    if (data.viewKey === "booked") {
      // Group by Booking date
      let lastDate = null;
      for (const j of data.jobs) {
        if (j.bookingDate !== lastDate) {
          lastDate = j.bookingDate;
          html += `<div class="list-section-header">${escapeHtml(fmtDateLong(j.bookingDate) || "(no date)")}</div>`;
        }
        html += cardHtml(j, "booked");
      }
    } else if (data.viewKey === "done") {
      // done: list sorted newest completion first
      for (const j of data.jobs) {
        html += cardHtml(j, "done");
      }
    } else {
      // contacted: just list, oldest last touch first
      for (const j of data.jobs) {
        html += cardHtml(j, "contacted");
      }
    }
    html += `</div>`;
    main.innerHTML = html;
    main.querySelectorAll(".card").forEach(el => {
      el.addEventListener("click", () => openEditModal(el.dataset.id));
    });
    main.querySelectorAll("[data-tried]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        handleTriedClick(btn);
      });
    });
  }

  // Stages where the "I tried contacting them" inline button makes sense.
  // These are the active outreach stages — once a Job is Booked, Done, or
  // Lost there's no follow-up to log anymore.
  const TRIED_STAGES = new Set(["🆕 New lead", "💬 Quoted", "📞 Contacted"]);

  // Stages where Luke wants the Notes-from-Luke text inline on the card.
  // Contacted: see outreach history at a glance. Lost: see the loss reason.
  // Fake: see why it was marked fake (e.g. bot-filled form, dead number).
  const NOTES_INLINE_STAGES = new Set(["📞 Contacted", "❌ Lost", "🚫 Fake"]);

  // Return the most useful chunk of a notes blob for inline display —
  // the last ~3 lines, trimmed, joined back with newlines so the CSS
  // line-clamp can handle the visual cap.
  function notesPreview(raw) {
    if (!raw) return "";
    const lines = String(raw).split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    return lines.slice(-3).join("\n");
  }

  // ── "Tried contacting them" inline handler ───────────────────────────
  // Optimistic: stamp the button as done immediately, then call the API.
  // On success, reload the kanban (preserving column) so the local state
  // matches Airtable. On failure, revert the button.
  async function handleTriedClick(btn) {
    const jobId = btn.dataset.tried;
    if (!jobId) return;
    if (btn.disabled) return;
    btn.disabled = true;
    const wasDone = btn.classList.contains("done");
    btn.classList.add("done");
    btn.textContent = "✓ Tried today";
    try {
      const params = new URLSearchParams({ action: "log-outreach" });
      if (apiKey) params.set("key", apiKey);
      const r = await fetch(`${apiBase}/api/ops?${params.toString()}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ jobId }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      toast("Logged outreach");
      // Reload kanban data so the card reflects the new stage (the
      // log-outreach endpoint bumps stage → Contacted if it was earlier).
      load({ preservePosition: true });
    } catch (err) {
      // Revert on failure so the user knows something went wrong
      if (!wasDone) {
        btn.classList.remove("done");
        btn.textContent = "📞 Tried";
      }
      btn.disabled = false;
      toast("Failed to log: " + err.message, true);
    }
  }

  function cardHtml(j, mode) {
    const stage = j.pipelineStage || "(no stage)";
    const sc = stageClass(stage);
    const titleParts = [];
    if (j.jobId) titleParts.push(escapeHtml(j.jobId));
    else if (j.clientName) titleParts.push(escapeHtml(j.clientName) + " · " + escapeHtml(j.serviceType || "(no service)"));
    else titleParts.push("(unnamed job)");

    const meta = [];
    if (mode === "booked") {
      // booking-date-centric: show client, quote date, last touch
      if (j.clientName)  meta.push(`<span>${escapeHtml(j.clientName)}</span>`);
      if (j.quoteDate)   meta.push(`<span>quoted ${escapeHtml(fmtDate(j.quoteDate))}</span>`);
    } else if (mode === "contacted") {
      // contacted: show client, last touch (with relative), outreach #
      if (j.clientName)  meta.push(`<span>${escapeHtml(j.clientName)}</span>`);
      if (j.lastTouch)   meta.push(`<span>last touch ${escapeHtml(fmtDateRelative(j.lastTouch))}</span>`);
      else               meta.push(`<span>no last-touch</span>`);
    } else if (mode === "done") {
      // done: client + completion date + phone (useful for finding past customers)
      if (j.clientName)      meta.push(`<span>${escapeHtml(j.clientName)}</span>`);
      if (j.completionDate)  meta.push(`<span>done ${escapeHtml(fmtDate(j.completionDate))}</span>`);
      else if (j.createDate) meta.push(`<span>created ${escapeHtml(fmtDate(j.createDate))}</span>`);
      if (j.clientPhone)     meta.push(`<span>${escapeHtml(j.clientPhone)}</span>`);
    } else {
      // kanban: show client + a relevant date
      if (j.clientName)  meta.push(`<span>${escapeHtml(j.clientName)}</span>`);
      const relDate = j.quoteDate || j.createDate || j.bookingDate;
      if (relDate)       meta.push(`<span>${escapeHtml(fmtDate(relDate))}</span>`);
    }

    const pills = [];
    if (mode !== "kanban") pills.push(`<span class="pill ${sc}">${escapeHtml(stage)}</span>`);
    if (j.outreachAttempts > 0) pills.push(`<span class="pill outreach">${j.outreachAttempts}× outreach</span>`);
    if (j.customerResponded) pills.push(`<span class="pill responded">replied</span>`);

    // "Tried contacting them" inline button — only for the active outreach
    // stages (New lead / Quoted / Contacted). Shown on kanban + contacted
    // list, NOT on booked / done lists (no follow-up needed there).
    const showTried = TRIED_STAGES.has(stage) && (mode === "kanban" || mode === "contacted");
    let triedRow = "";
    if (showTried) {
      const triedToday = j.lastTouch === todayISO();
      const lastTouchLabel = j.lastTouch
        ? `Last tried <strong>${escapeHtml(fmtDateRelative(j.lastTouch))}</strong>${j.outreachAttempts > 0 ? ` · ${j.outreachAttempts}×` : ""}`
        : `Not yet contacted`;
      triedRow = `
        <div class="tried-row" data-tried-row="${escapeHtml(j.id)}">
          <span class="last-touch">${lastTouchLabel}</span>
          <button type="button" class="tried-btn${triedToday ? " done" : ""}" data-tried="${escapeHtml(j.id)}"${triedToday ? "" : ""}>
            ${triedToday ? "✓ Tried today" : "📞 Tried"}
          </button>
        </div>
      `;
    }

    // Inline notes preview on Contacted + Lost cards. Contacted gets the
    // outreach history (so Luke sees what he last tried). Lost gets the
    // loss reason that he writes in "Notes from Luke".
    let notesBlock = "";
    if (NOTES_INLINE_STAGES.has(stage)) {
      const preview = notesPreview(j.notesFromLuke);
      if (preview) {
        notesBlock = `<div class="card-notes">${escapeHtml(preview)}</div>`;
      } else if (stage === "❌ Lost" || stage === "🚫 Fake") {
        notesBlock = `<div class="card-notes"><em>No reason logged. Tap card to add one.</em></div>`;
      }
    }

    return `
      <div class="card" data-id="${escapeHtml(j.id)}">
        <div class="card-row">
          <div class="card-title">${titleParts.join("")}</div>
          ${j.quoteAmount ? `<div class="card-amount">${escapeHtml(fmtMoney(j.quoteAmount))}</div>` : ""}
        </div>
        ${meta.length ? `<div class="card-meta">${meta.join(`<span class="sep">·</span>`)}</div>` : ""}
        ${pills.length ? `<div class="card-bottom">${pills.join("")}</div>` : ""}
        ${notesBlock}
        ${triedRow}
      </div>
    `;
  }

  // ── Edit modal ────────────────────────────────────────────────────────
  const backdrop = document.getElementById("modal-backdrop");
  const sheet    = document.getElementById("modal-sheet");
  const sheetTitle = document.getElementById("sheet-title");
  const sheetSub   = document.getElementById("sheet-sub");
  const sheetBody  = document.getElementById("sheet-body");
  const saveBtn    = document.getElementById("sheet-save");

  function openEditModal(jobId) {
    const j = findJob(jobId);
    if (!j) return;
    currentJob = j;
    sheetTitle.textContent = j.jobId || j.clientName || "(unnamed)";
    const subParts = [];
    if (j.clientName) subParts.push(j.clientName);
    if (j.clientPhone) subParts.push(j.clientPhone);
    if (j.serviceType) subParts.push(j.serviceType);
    sheetSub.textContent = subParts.join(" · ") || "—";

    sheetBody.innerHTML = renderEditForm(j);
    setSaveStatus("clean");

    // Wire up "Today" buttons for date fields
    sheetBody.querySelectorAll("[data-today-target]").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = sheetBody.querySelector(`[name="${CSS.escape(btn.dataset.todayTarget)}"]`);
        if (target) {
          target.value = todayISO();
          markDirty();
        }
      });
    });
    // Wire up "+1" outreach button
    const plus1 = sheetBody.querySelector("[data-plus-one]");
    if (plus1) {
      plus1.addEventListener("click", () => {
        const input = sheetBody.querySelector(`[name="${CSS.escape(plus1.dataset.plusOne)}"]`);
        if (input) {
          input.value = String(Number(input.value || 0) + 1);
          markDirty();
        }
      });
    }

    // Wire up auto-save: any change to a field triggers debounced save
    sheetBody.querySelectorAll("[name]").forEach(el => {
      el.addEventListener("input", markDirty);
      el.addEventListener("change", markDirty);
    });

    // Conversation transcript toggle
    const convoToggle = sheetBody.querySelector("#convo-toggle");
    const convoBody   = sheetBody.querySelector("#convo-body");
    if (convoToggle && convoBody) {
      convoToggle.addEventListener("click", () => {
        const collapsed = convoBody.classList.toggle("collapsed");
        convoToggle.querySelector("span:first-child").textContent =
          collapsed ? "Show full transcript" : "Hide transcript";
        if (!collapsed) {
          // Scroll the transcript into view so Luke can start reading
          convoBody.scrollTop = 0;
          convoBody.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      });
    }

    // Wire up the two-step delete button
    const deleteBtn = sheetBody.querySelector("#job-delete-btn");
    if (deleteBtn) {
      let armed = false;
      let armTimer = null;
      const disarm = () => {
        armed = false;
        deleteBtn.classList.remove("armed");
        deleteBtn.textContent = "Delete this job";
      };
      deleteBtn.addEventListener("click", async () => {
        if (!armed) {
          armed = true;
          deleteBtn.classList.add("armed");
          deleteBtn.textContent = "Tap again within 4s to confirm delete";
          if (armTimer) clearTimeout(armTimer);
          armTimer = setTimeout(disarm, 4000);
          return;
        }
        // Second tap → actually delete
        if (armTimer) clearTimeout(armTimer);
        if (!currentJob) return;
        deleteBtn.disabled = true;
        deleteBtn.textContent = "Deleting…";
        try {
          const params = new URLSearchParams({ action: "delete" });
          if (apiKey) params.set("key", apiKey);
          const r = await fetch(`${apiBase}/api/ops?${params.toString()}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ jobId: currentJob.id }),
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
          toast("Deleted");
          closeModal();
          load();
        } catch (err) {
          toast("Delete failed: " + err.message, true);
          deleteBtn.disabled = false;
          disarm();
        }
      });
    }

    backdrop.classList.add("open");
    sheet.classList.add("open");
    saveBtn.disabled = false;
  }
  async function closeModal() {
    // Flush any pending auto-save so users don't lose typing on backdrop tap
    if (autoSaveTimer) {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = null;
      try { await performSave({ closeAfter: false, reloadAfter: false }); } catch {}
    }
    backdrop.classList.remove("open");
    sheet.classList.remove("open");
    currentJob = null;
    setSaveStatus("clean");
    // Refresh the kanban so the card reflects whatever auto-saved while open
    load({ preservePosition: true });
  }
  backdrop.addEventListener("click", () => { closeModal(); });
  document.getElementById("sheet-cancel").addEventListener("click", () => { closeModal(); });

  // "Discuss in chat" — set selectedJobId, close modal, open chat with job as context
  document.getElementById("sheet-discuss").addEventListener("click", () => {
    if (!currentJob) return;
    selectedJobId = currentJob.id;
    closeModal();
    openChat();
  });

  function findJob(jobRecId) {
    if (!currentData) return null;
    if (currentData.layout === "kanban") {
      for (const col of currentData.columns) {
        const found = col.jobs.find(j => j.id === jobRecId);
        if (found) return found;
      }
      const u = (currentData.unstaged || []).find(j => j.id === jobRecId);
      if (u) return u;
    } else {
      return currentData.jobs.find(j => j.id === jobRecId);
    }
    return null;
  }

  function renderEditForm(j) {

    const sourceOpts = dedup(["", "Yelp", "Angi", "Google", "Facebook", "Referral", "Door-knock", "Repeat", "Other", j.clientSource || ""]);
    const leadOriginOpts = dedup(["", "Angi", "Yelp", "Google", "Facebook", "Referral", "Door-knock", "Repeat", "Other", j.leadOrigin || ""]);
    return `

      <div class="field">
        <label>Last touch <button type="button" class="quick-btn" data-today-target="job:Last touch" style="float:right;padding:2px 8px;font-size:11px;">today</button></label>
        <input name="job:Last touch" type="date" value="${j.lastTouch || ""}" />
      </div>

      <div class="field-row">
        <div class="field" style="flex:2;">

  // Parse the Job's "Conversation log" (JSON string of [{role, content}])
  // and render as a chat-style transcript. Collapsible: shows a toggle
  // button by default, body hidden. Section is omitted if no log exists.
  function renderConversationSection(j) {
    const raw = (j.conversationLog || "").trim();
    if (!raw) return "";
    let messages = [];
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) messages = parsed;
    } catch {
      // Not JSON — fall back to displaying the raw string as one message
      messages = [{ role: "system", content: raw }];
    }
    if (!messages.length) return "";
    const msgsHtml = messages.map(m => {
      const role = (m.role || "system").toString();
      const cls = role === "assistant" ? "assistant" : role === "user" ? "user" : "system";
      const content = String(m.content == null ? "" : (typeof m.content === "string" ? m.content : JSON.stringify(m.content)));
      return `<div class="convo-msg ${cls}">${escapeHtml(content)}</div>`;
    }).join("");
    return `
      <div class="section-header">Chatbot conversation <span class="hint">${messages.length} message${messages.length === 1 ? "" : "s"}</span></div>
      <button type="button" class="convo-toggle" id="convo-toggle">
        <span>Show full transcript</span>
        <span class="count">${messages.length} msg${messages.length === 1 ? "" : "s"}</span>
      </button>
      <div class="convo-body collapsed" id="convo-body">${msgsHtml}</div>
    `;
  }

  // ── Auto-save + manual save ─────────────────────────────────────────
  const saveStatusEl = document.getElementById("save-status");
  let autoSaveTimer = null;
  let saveInFlight = false;
  let pendingAfterSave = false;

  function setSaveStatus(state) {
    saveStatusEl.classList.remove("saving", "saved", "error", "dirty");
    if (state === "clean")      { saveStatusEl.textContent = ""; }
    else if (state === "dirty") { saveStatusEl.textContent = "Unsaved…"; saveStatusEl.classList.add("dirty"); }
    else if (state === "saving"){ saveStatusEl.textContent = "Saving…"; saveStatusEl.classList.add("saving"); }
    else if (state === "saved") { saveStatusEl.textContent = "Saved ✓"; saveStatusEl.classList.add("saved"); }
    else if (state === "error") { saveStatusEl.textContent = "Save failed"; saveStatusEl.classList.add("error"); }
  }

  function markDirty() {
    if (!currentJob) return;
    setSaveStatus("dirty");
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => performSave({ closeAfter: false, reloadAfter: false }), 900);
  }

  function collectFieldDiffs() {
    if (!currentJob) return { jobDiff: {}, clientDiff: {} };
    const jobValues = {};
    const clientValues = {};
    sheetBody.querySelectorAll("[name]").forEach(el => {
      const raw = el.getAttribute("name");
      const [ns, ...rest] = raw.split(":");
      const fieldName = rest.join(":");
      const val = el.value === "" ? null : el.value;
      if (ns === "job")    jobValues[fieldName] = val;
      else if (ns === "client") clientValues[fieldName] = val;
    });

    const originalJob = {
      "Pipeline stage":     currentJob.pipelineStage || null,
      "Lead status":        currentJob.leadStatus    || null,
      "Quote amount":       currentJob.quoteAmount   ?? null,
      "Quote date":         currentJob.quoteDate     || null,
      "Quote":              currentJob.quote         || null,
      "Booking date":       currentJob.bookingDate   || null,
      "Last touch":         currentJob.lastTouch     || null,
      "Outreach attempts":  currentJob.outreachAttempts ?? null,
      "Customer responded": currentJob.customerResponded || null,
      "Completion date":    currentJob.completionDate || null,
      "Service type":       currentJob.serviceType   || null,
      "Property snapshot":  currentJob.propertySnapshot || null,
      "Notes from Luke":    currentJob.notesFromLuke || null,
      "Concerns":           currentJob.concerns      || null,
      "Lead origin":        currentJob.leadOrigin    || null,
    };
    const originalClient = {
      "Full name": currentJob.clientFullName || currentJob.clientName || null,
      "Name":      currentJob.clientFirstName || null,
      "Phone":     currentJob.clientPhone     || null,
      "Email":     currentJob.clientEmail     || null,
      "Address":   currentJob.clientAddress   || null,
      "Source":    currentJob.clientSource    || null,
    };

    const diffJob = {};
    for (const [k, v] of Object.entries(jobValues)) {
      const before = originalJob[k];
      const a = v == null ? null : (typeof before === "number" ? Number(v) : String(v));
      const b = before == null ? null : (typeof before === "number" ? before : String(before));
      if (a !== b) diffJob[k] = v;
    }
    const diffClient = {};
    for (const [k, v] of Object.entries(clientValues)) {
      const a = v == null ? null : String(v);
      const b = originalClient[k] == null ? null : String(originalClient[k]);
      if (a !== b) diffClient[k] = v;
    }
    return { jobDiff: diffJob, clientDiff: diffClient };
  }

  async function performSave({ closeAfter = false, reloadAfter = false } = {}) {
    if (!currentJob) return;
    if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }
    if (saveInFlight) { pendingAfterSave = true; return; }

    const { jobDiff, clientDiff } = collectFieldDiffs();
    const hasJobChanges    = Object.keys(jobDiff).length > 0;
    const hasClientChanges = Object.keys(clientDiff).length > 0;

    if (!hasJobChanges && !hasClientChanges) {
      setSaveStatus("clean");
      if (closeAfter) closeModal();
      return;
    }

    saveInFlight = true;
    setSaveStatus("saving");
    saveBtn.disabled = true;
    const prevLabel = saveBtn.textContent;
    saveBtn.textContent = "Saving…";

    try {
      if (hasJobChanges) {
        const params = new URLSearchParams({ action: "update" });
        if (apiKey) params.set("key", apiKey);
        const r = await fetch(`${apiBase}/api/ops?${params.toString()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jobId: currentJob.id, fields: jobDiff }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        // Patch local state so subsequent auto-saves don't re-send the same diff
        Object.assign(currentJob, {
          pipelineStage:    jobDiff["Pipeline stage"]    ?? currentJob.pipelineStage,
          leadStatus:       jobDiff["Lead status"]       ?? currentJob.leadStatus,
          quoteAmount:      "Quote amount" in jobDiff ? (jobDiff["Quote amount"] == null ? null : Number(jobDiff["Quote amount"])) : currentJob.quoteAmount,
          quoteDate:        "Quote date" in jobDiff    ? jobDiff["Quote date"]    : currentJob.quoteDate,
          quote:            "Quote" in jobDiff         ? jobDiff["Quote"]         : currentJob.quote,
          bookingDate:      "Booking date" in jobDiff  ? jobDiff["Booking date"]  : currentJob.bookingDate,
          lastTouch:        "Last touch" in jobDiff    ? jobDiff["Last touch"]    : currentJob.lastTouch,
          outreachAttempts: "Outreach attempts" in jobDiff ? Number(jobDiff["Outreach attempts"] || 0) : currentJob.outreachAttempts,
          customerResponded:"Customer responded" in jobDiff ? jobDiff["Customer responded"] : currentJob.customerResponded,
          completionDate:   "Completion date" in jobDiff   ? jobDiff["Completion date"] : currentJob.completionDate,
          serviceType:      "Service type" in jobDiff      ? jobDiff["Service type"] : currentJob.serviceType,
          propertySnapshot: "Property snapshot" in jobDiff ? jobDiff["Property snapshot"] : currentJob.propertySnapshot,
          notesFromLuke:    "Notes from Luke" in jobDiff   ? jobDiff["Notes from Luke"] : currentJob.notesFromLuke,
          concerns:         "Concerns" in jobDiff          ? jobDiff["Concerns"] : currentJob.concerns,
          leadOrigin:       "Lead origin" in jobDiff       ? jobDiff["Lead origin"] : currentJob.leadOrigin,
        });
      }

      if (hasClientChanges && currentJob.clientId) {
        const params = new URLSearchParams({ action: "update-client" });
        if (apiKey) params.set("key", apiKey);
        const r = await fetch(`${apiBase}/api/ops?${params.toString()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ clientId: currentJob.clientId, fields: clientDiff }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        // Patch local state
        if ("Full name" in clientDiff) {
          currentJob.clientFullName = clientDiff["Full name"];
          currentJob.clientName = clientDiff["Full name"] || currentJob.clientName;
        }
        if ("Name" in clientDiff)    currentJob.clientFirstName = clientDiff["Name"];
        if ("Phone" in clientDiff)   currentJob.clientPhone     = clientDiff["Phone"];
        if ("Email" in clientDiff)   currentJob.clientEmail     = clientDiff["Email"];
        if ("Address" in clientDiff) currentJob.clientAddress   = clientDiff["Address"];
        if ("Source" in clientDiff)  currentJob.clientSource    = clientDiff["Source"];
      }

      setSaveStatus("saved");
      saveBtn.textContent = prevLabel;
      saveBtn.disabled = false;

      if (closeAfter) {
        // closeModal() itself triggers a load(); don't double-load here
        closeModal();
      } else if (reloadAfter) {
        load({ preservePosition: true });
      } else {
        // Fade the "Saved" pill back to clean after a moment
        setTimeout(() => {
          if (saveStatusEl.classList.contains("saved")) setSaveStatus("clean");
        }, 1800);
      }
    } catch (err) {
      setSaveStatus("error");
      toast("Save failed: " + err.message, true);
      saveBtn.disabled = false;
      saveBtn.textContent = prevLabel;
    } finally {
      saveInFlight = false;
      if (pendingAfterSave) {
        pendingAfterSave = false;
        // Re-trigger an auto-save shortly in case more changes happened mid-flight
        setTimeout(markDirty, 50);
      }
    }
  }

  function loadChatHistory() {
    try {
      const raw = localStorage.getItem(CHAT_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch { return []; }
  }
  function saveChatHistory() {
    // Trim to last 30 turns to keep storage + tokens sane
    const trimmed = chatHistory.slice(-30);
    try { localStorage.setItem(CHAT_KEY, JSON.stringify(trimmed)); } catch {}
  }

  function viewLabel(v) {

      "contacted": "Waiting for Client",

  function renderChat() {
    if (!chatHistory.length) {
      messagesEl.innerHTML = `
        <div class="chat-empty">
          <div>Tap a workflow to get started, or just type what happened on your phone.</div>
          <div class="workflow-buttons">
            <button data-workflow="NEW CLIENT">+ New client</button>
            <button data-workflow="NEW JOB">+ Job (existing)</button>
            <button data-workflow="OUTREACH">Outreach</button>
            <button data-workflow="QUOTED">Quoted</button>
            <button data-workflow="BOOKED">Booked</button>
            <button data-workflow="DRAFT MESSAGE">Draft message</button>
          </div>
        </div>
      `;
      messagesEl.querySelectorAll("[data-workflow]").forEach(btn => {
        btn.addEventListener("click", () => handleWorkflowButton(btn.dataset.workflow));
      });
      return;
    }
    messagesEl.innerHTML = "";
    for (const turn of chatHistory) {
      if (turn.role === "user") {
        messagesEl.insertAdjacentHTML("beforeend", `<div class="msg user">${escapeHtml(turn.content)}</div>`);
      } else if (turn.role === "assistant") {
        if (turn.toolCalls?.length) messagesEl.insertAdjacentHTML("beforeend", renderToolTrace(turn.toolCalls));
        if (turn.content) messagesEl.insertAdjacentHTML("beforeend", `<div class="msg assistant">${escapeHtml(turn.content)}</div>`);
      } else if (turn.role === "system") {
        messagesEl.insertAdjacentHTML("beforeend", `<div class="msg system">${escapeHtml(turn.content)}</div>`);
      }
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderToolTrace(toolCalls) {
    const rows = toolCalls.map(tc => {
      const isError = tc.error || tc.result?.error;
      const label = isError ? `${tc.name} · failed` : tc.name;
      return `<div class="tool-row"><span class="tool-name${isError ? " error" : ""}">${escapeHtml(label)}</span></div>`;
    }).join("");
    return `<div class="tool-trace">${rows}</div>`;
  }

  function showTyping() {
    const el = document.createElement("div");

    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;

  function hideTyping() {
    const el = document.getElementById("chat-typing");
    if (el) el.remove();

  function updateContextStrip() {
    ctxView.value = currentView; // sync the dropdown
    if (selectedJobId) {
      const j = findJob(selectedJobId);
      ctxJob.textContent = `job: ${j?.jobId || j?.clientName || selectedJobId.slice(0, 10) + "…"} ✕`;
      ctxJob.style.display = "inline-block";

      ctxClient.style.display = "inline-block";
    } else {
      ctxClient.style.display = "none";

    if (selectedJobId || selectedClientId) {
      const j = selectedJobId ? findJob(selectedJobId) : null;
      ctxPillCollapsed.textContent = j?.jobId ? `→ ${j.jobId}` : (selectedClientId ? "→ client set" : "");
      ctxPillCollapsed.style.display = ctxPillCollapsed.textContent ? "inline-block" : "none";
    } else {
      ctxPillCollapsed.style.display = "none";
    }
  }

  async function sendChat() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;
    chatHistory.push({ role: "user", content: text });
    inputEl.value = "";
    autoSizeInput();
    saveChatHistory();
    renderChat();
    showTyping();
    isStreaming = true;
    sendBtn.disabled = true;

    try {
      const params = new URLSearchParams({ action: "chat" });
      if (apiKey) params.set("key", apiKey);
      const r = await fetch(`${apiBase}/api/ops?${params.toString()}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: chatHistory.map(t => ({ role: t.role, content: t.content })).filter(t => t.role === "user" || t.role === "assistant"),
          view: currentView,
          selectedJobId,
          selectedClientId,
        }),
      });
      const data = await r.json().catch(() => ({}));
      hideTyping();
      if (!r.ok) {
        chatHistory.push({ role: "system", content: `Error: ${data.error || "HTTP " + r.status}` });
      } else {
        chatHistory.push({
          role: "assistant",
          content: data.reply || "(no response)",
          toolCalls: data.toolCalls || [],
        });
        // After any mutation, reload Kanban data so it reflects changes
        const mutated = (data.toolCalls || []).some(tc => ["create_client","create_job","update_job","log_outreach","log_response","book_calendar"].includes(tc.name) && !tc.error);
        if (mutated) load();
      }
      saveChatHistory();
      renderChat();
    } catch (err) {
      hideTyping();
      chatHistory.push({ role: "system", content: `Network error: ${err.message}` });
      saveChatHistory();
      renderChat();
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function runClientSearch(query) {
    const resultsEl = document.getElementById("newjob-client-results");

      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      const matches = data.matches || [];
      if (!matches.length) {
        resultsEl.innerHTML = `<div class="client-search-empty">No clients match. Try a different search, or use the chat to add a brand-new client.</div>`;
        return;
      }
      resultsEl.innerHTML = matches.map(m => `

    const serviceType = document.getElementById("nj-service-type").value.trim();

    const fields = {

    };
    const qa = document.getElementById("nj-quote-amount").value;
    if (qa !== "")                                            fields["Quote amount"] = Number(qa);
    if (document.getElementById("nj-booking-date").value)     fields["Booking date"] = document.getElementById("nj-booking-date").value;
    if (document.getElementById("nj-property-snapshot").value) fields["Property snapshot"] = document.getElementById("nj-property-snapshot").value;

    newjobSaveBtn.disabled = true;
    newjobSaveBtn.textContent = "Creating…";
    try {
      const params = new URLSearchParams({ action: "create-job" });
      if (apiKey) params.set("key", apiKey);
      const r = await fetch(`${apiBase}/api/ops?${params.toString()}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clientId: newjobSelectedClient.id, fields }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      toast("Job created");

      // Push it to the chat so the agent has context next time Luke talks
      // to it. We post as a system note (not as the assistant — the assistant
      // didn't actually run this, we did) and select the new job so chat
      // context points at it immediately.
      const summary = [
        `New job created for ${newjobSelectedClient.name}: ${serviceType}.`,
        `Stage: ${fields["Pipeline stage"]}`,
        fields["Lead origin"] ? `Lead origin: ${fields["Lead origin"]}` : null,
        fields["Quote amount"] != null ? `Quote: $${fields["Quote amount"]}` : null,
        fields["Booking date"] ? `Booking date: ${fields["Booking date"]}` : null,
      ].filter(Boolean).join(" · ");
      chatHistory.push({ role: "system", content: summary });
      saveChatHistory();
      if (data.jobId) {
        selectedJobId = data.jobId;
        updateContextStrip();
      }
      // If the chat sheet happens to be open, re-render so the system note
      // shows up live. (Normally NEW JOB closes the chat first; this guards
      // the FAB-only path where chat was already open in the background.)
      renderChat();

      closeNewJobModal();
      load({ preservePosition: true });
    } catch (err) {
      toast("Create failed: " + err.message, true);
      newjobSaveBtn.disabled = false;
    } finally {
      newjobSaveBtn.textContent = "Create job";
    }
  });

  // ── Boot ─────────────────────────────────────────────────────────────
  (async () => {
    await load();
    setupAutoRefresh();

    // Deep-link support: ?open=recXXX in the URL (used by Telegram
    // notifyLead/notifyQuote pings) opens that job's edit modal on
    // page load. If the job isn't in the current view, fall back to
    // "all" so it's findable.
    const openId = qs.get("open");
    if (openId && /^rec[A-Za-z0-9]{14}$/.test(openId)) {
      if (!findJob(openId) && currentView !== "all") {
        currentView = "all";
        localStorage.setItem("lp_ops_view", currentView);
        setActiveView(currentView);
        await load({ preservePosition: false });
      }
      if (findJob(openId)) {
        setTimeout(() => openEditModal(openId), 250);
      }
      // Strip ?open= from the URL so a refresh doesn't keep re-opening
      try {
        const u = new URL(window.location.href);
        u.searchParams.delete("open");
        history.replaceState(null, "", u.toString());
      } catch {}
    }
  })();
</script>
